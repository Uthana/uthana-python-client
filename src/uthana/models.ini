# Default models for Uthana API endpoints.
# The first model in each list is used when model="auto".

[ttm]
default = vqvae-v1
models = vqvae-v1, diffusion-v2, flow-matching-v1, nearest-neighbor-v1

[vtm]
default = video-to-motion-v1
models = video-to-motion-v1, video-to-motion-v2

[stitch]
default = enhanced_stitch
models = enhanced_stitch